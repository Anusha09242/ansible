- name: demo on prompt
  hosts: local
  connection: local
  vars_prompt:
    - name: username
      prompt: "Please enter username"
      private: false

    - name: password
      prompt: "Please enter password"
      private: true   #it won't visible

  tasks:
  - name: print information
    debug:
      msg: "Username is: {{ username }}, Password is: {{ password }}"