- name: demo on filters
  hosts: local
  connection: local
  vars:
    topics: Linux, Shell, Ansible, Terraform
    tagMap:
      name: Ansible
      project: roboshop
      environment: dev
    full_name: Anusha Pothu
    ip_address: 170.90.80.7
    tagList:  [
      {'key': 'name', 'value': 'Ansible'}, {'key': 'project', 'value': 'roboshop'}, {'key': 'environment', 'value': 'dev'}]
  tasks:
  - name: convert string to list
    debug:
      msg: "Topics are: {{ topics | split(',') }}"

  - name: set default value
    debug:
      msg: "Hi, {{ GREETING | default('Good Morning') }}"

  - name: convert map to list
    debug:
      msg: "{{ tagMap | dict2items }}"

  - name: convert list to map
    debug:
      msg: "{{ tagList | items2dict }}"

  - name: convert to uppercase
    debug:
      msg: "{{ full_name | upper }}"

  - name: convert to lowercase
    debug:
      msg: "{{ full_name | lower }}"

  - name: check valid ip address
    debug:
      msg: "{{ ip_address | ansible.utils.ipv4 }}"
