- name: demo on error handling
  hosts: local
  connection: local
  tasks:
  - name: check roboshop user exists or not
    command: id roboshop
    register: user_output
    ignore_errors: true    #to ignore the error

  - name: print user output
    debug:
      msg: "{{ user_output}}"

  - name: create user
    command: id roboshop
    when: user_output.rc != 0